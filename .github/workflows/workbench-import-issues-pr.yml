name: Workbench Import Issues PR

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  import-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: workbench-import-issues-pr
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET from global.json
        if: ${{ hashFiles('global.json') != '' }}
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup .NET default
        if: ${{ hashFiles('global.json') == '' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve Workbench tool
        shell: bash
        run: |
          cat > ./.workbench.nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

          if [ -f .config/dotnet-tools.json ] && grep -qi '"incursa.workbench"' .config/dotnet-tools.json; then
            dotnet tool restore --configfile ./.workbench.nuget.config
          else
            mkdir -p ./.tools
            dotnet tool install --tool-path ./.tools incursa.workbench --configfile ./.workbench.nuget.config
          fi

      - name: Import GitHub issues into local work items
        shell: bash
        run: |
          if [ -x ./.tools/workbench ]; then
            ./.tools/workbench item sync -- --import-issues
          else
            dotnet tool run workbench -- item sync -- --import-issues
          fi

      - name: Detect imported issue changes
        id: import_diff
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create work item import pull request
        if: steps.import_diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/workbench-import-issues
          delete-branch: true
          commit-message: "chore: import GitHub issues into workbench items"
          title: "chore: import GitHub issues into workbench items"
          body: |
            Automated import of GitHub issues that were not yet represented in the local workbench files.

            This PR was created by the scheduled workbench import workflow.
